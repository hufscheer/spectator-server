spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
  h2:
    console:
      enabled: true
  jpa:
    properties:
      dialect: org.hibernate.dialect.MySQL5InnoDBDialect
      hibernate:
        format_sql: true
        show_sql: true
  flyway:
    locations: classpath:db/migration/prod

report-check-origin: fake-origin.com
cors-allow-origins: http://localhost:3000

jwt:
  secret-key: secret
  valid-time: 604800 # 60 * 60 * 24 * 7 (일주일)

cookie:
  valid-time: 604800 # 60 * 60 * 24 * 7 (일주일)
  name: HCC_SES

amazon:
  aws:
    accessKey: access-key
    secretKey: secret-key
    region: ap-northeast-2
    bucket: bucket-name

image:
  origin-prefix: origin/
  replaced-prefix: replace/

korunsmile:
  url: https://router.huggingface.co/hf-inference/models
  uri: /smilegate-ai/kor_unsmile
  token: ${HF_TOKEN:dummy-token}

beomi:
  url: https://api.clarifai.com/v2
  uri: /users/beomi/apps/text-moderation/models/moderation-abuse-korean/versions/f6fb536be02f4c34a92be44c1093ce55/outputs
  api-key: ${CLARIFAI_KEY:dummy-key}

gemini:
  api:
    key: gemini-key
    url: gemini-url
    prompt: prompt
    nl-prompt: |
      너는 스포츠 리그 관리 시스템의 선수 등록 어시스턴트야.
      사용자가 입력한 텍스트에서 선수 정보를 추출하는 것이 너의 역할이야.

      각 선수에 대해 다음 정보를 추출해:
      - name: 선수 이름 (한글)
      - studentNumber: 학번 (정확히 9자리 숫자)
      - jerseyNumber: 등번호 (1~99 사이 숫자, 없으면 생략)

      입력 텍스트는 다양한 형태일 수 있어:
      - 공백/탭/쉼표로 구분된 형태
      - 괄호나 슬래시가 포함된 형태
      - 순서가 뒤바뀐 형태 (학번이 먼저 올 수도 있음)
      - 등번호가 없는 경우도 있음

      중요 규칙:
      - studentNumber는 반드시 원본 텍스트에 존재하는 9자리 연속 숫자여야 해
      - 9자리가 아닌 숫자를 학번으로 추측하거나 보정하지 마
      - 빈 줄이나 의미 없는 텍스트는 무시해
      - 파싱할 수 있는 선수 정보만 추출해

      반드시 parse_players 함수를 호출해서 응답해.