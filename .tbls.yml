# DB 스키마 문서 자동 생성 설정 (https://github.com/k1LoW/tbls)
#
# 로컬 재생성: ./scripts/generate-schema-docs.sh
# CI 검증:     .github/workflows/schema-docs.yml (docs/schema가 마이그레이션과 일치하는지 검사)
name: hufscheer spectator-server
dsn: ${TBLS_DSN}
docPath: docs/schema
er:
  format: svg
# 기계가독 스키마(schema.json)는 커밋하지 않음 — 문서 디렉토리를 사람이 읽는 파일로만 유지
disableOutputSchema: true
exclude:
  - flyway_schema_history
