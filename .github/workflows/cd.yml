name: spring server cd

on:
  workflow_dispatch:
  push:
    branches: [ "main", "develop" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 Checkout
        uses: actions/checkout@v3
        with:
          submodules: true
          token: ${{ secrets.ACTION_TOKEN }}

      - name: 자바 17 설정
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: 빌드
        run: ./gradlew build

      - name: 환경 결정
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "TARGET=prod" >> $GITHUB_OUTPUT
            echo "HOST=${{ secrets.WAS_HOST }}" >> $GITHUB_OUTPUT
            echo "KEY_SECRET=KEY" >> $GITHUB_OUTPUT
            echo "IMG=${{ secrets.DOCKER_IMG }}" >> $GITHUB_OUTPUT
            echo "COMPOSE=docker-compose.yml" >> $GITHUB_OUTPUT
          else
            echo "TARGET=dev" >> $GITHUB_OUTPUT
            echo "HOST=${{ secrets.WAS_HOST_DEV }}" >> $GITHUB_OUTPUT
            echo "KEY_SECRET=KEY_DEV" >> $GITHUB_OUTPUT
            echo "IMG=${{ secrets.DOCKER_IMG_DEV }}:dev" >> $GITHUB_OUTPUT
            echo "COMPOSE=docker-compose.dev.yml" >> $GITHUB_OUTPUT
          fi

      - name: 도커 이미지 빌드
        run: docker build -t ${{ steps.env.outputs.IMG }} .

      - name: Docker Hub 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Hub push
        run: docker push ${{ steps.env.outputs.IMG }}

      - name: scp be-config docker (prod)
        if: steps.env.outputs.TARGET == 'prod'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.WAS_HOST }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          source: "./src/main/resources/be-config/docker/"
          target: "/home/ubuntu/staging"
          strip_components: 6

      - name: scp monitoring compose (prod)
        if: steps.env.outputs.TARGET == 'prod'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.WAS_HOST }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          source: "./src/main/resources/be-config/docker/docker-compose.monitoring.yml"
          target: "/home/ubuntu"
          strip_components: 6

      - name: scp monitoring configs (prod)
        if: steps.env.outputs.TARGET == 'prod'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.WAS_HOST }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          source: "./src/main/resources/be-config/monitoring/"
          target: "/home/ubuntu/monitoring"
          strip_components: 6

      - name: 배포 (prod, blue/green)
        if: steps.env.outputs.TARGET == 'prod'
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.WAS_HOST }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          script: |
            set -e
            cd /home/ubuntu

            cp /home/ubuntu/staging/docker-compose.yml /home/ubuntu/docker-compose.yml
            cp /home/ubuntu/staging/deploy.sh /home/ubuntu/deploy.sh
            chmod +x /home/ubuntu/deploy.sh

            mkdir -p /home/ubuntu/nginx/conf.d /home/ubuntu/nginx/templates
            cp /home/ubuntu/staging/nginx/blue.conf /home/ubuntu/nginx/templates/blue.conf
            cp /home/ubuntu/staging/nginx/green.conf /home/ubuntu/nginx/templates/green.conf

            if [ ! -f /home/ubuntu/nginx/conf.d/default.conf ] || [ -L /home/ubuntu/nginx/conf.d/default.conf ]; then
                rm -f /home/ubuntu/nginx/conf.d/default.conf
                cp /home/ubuntu/nginx/templates/blue.conf /home/ubuntu/nginx/conf.d/default.conf
            fi

            if docker ps --format '{{.Names}}' | grep -q '^hufscheer-server$'; then
                echo "[cutover] removing legacy hufscheer-server"
                docker stop hufscheer-server || true
                docker rm hufscheer-server || true
            fi

            if [ ! -f /home/ubuntu/.active_slot ]; then
                echo green > /home/ubuntu/.active_slot
            fi

            docker compose -f docker-compose.yml up -d router

            bash /home/ubuntu/deploy.sh

      - name: scp docker-compose (dev)
        if: steps.env.outputs.TARGET == 'dev'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.WAS_HOST_DEV }}
          username: ubuntu
          key: ${{ secrets.KEY_DEV }}
          source: "./src/main/resources/be-config/docker/docker-compose.dev.yml"
          target: "/home/ubuntu"
          strip_components: 6

      - name: 배포 (dev)
        if: steps.env.outputs.TARGET == 'dev'
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.WAS_HOST_DEV }}
          username: ubuntu
          key: ${{ secrets.KEY_DEV }}
          script: |
            docker pull ${{ steps.env.outputs.IMG }}
            DOCKER_IMG=${{ steps.env.outputs.IMG }} docker compose -f docker-compose.dev.yml up -d --force-recreate
            docker image prune -f
